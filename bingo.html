<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Persoonlijke bingokaart</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
  
  <div id="nav-placeholder"></div>

  <main id="bingo-content">
    </main>
  
  <script>
    fetch('nav.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('nav-placeholder').innerHTML = data;
      });
    
    const main = document.getElementById('bingo-content');

    // 2. Check of er al een bekende gebruiker is
    const savedUser = localStorage.getItem('bingoUser');

    if (savedUser) {
      showBingo(savedUser);
    } else {
      showLoginForm();
    }

    // Functie: Inlogscherm tonen
    function showLoginForm() {
      main.innerHTML = `
        <div class="card login-form">
          <h2>Inloggen voor Bingo</h2>
          <p>Vul je naam in om je persoonlijke kaart te openen.</p>
          <input type="text" id="username" placeholder="Je naam (bijv. Jan)">
          <input type="password" id="password" placeholder="Wachtwoord">
          <button onclick="login()" class="btn-primary">Open mijn kaart</button>
          <p id="error" style="color:red; display:none;">Verkeerd wachtwoord!</p>
        </div>
      `;
    }

    // Functie: Inloggen verwerken
    function login() {
        const user = document.getElementById('username').value.trim().toLowerCase();
        const pass = document.getElementById('password').value.trim();

        // Het Wachtwoordenboek
        const teamLeden = {
            "julian": "Bier123",
            "tycho": "Scoor456",
            "fabio": "Keeper007",
            "lars": "ParkhoutWin",
            "franck": "Vakantie2026",
            "sten": "Scoor456",
            "john": "Keeper007",
            "marco": "ParkhoutWin",
            "matej": "Vakantie2026",
            "lennart": "Scoor456",
            "marijn": "Keeper007",
            "marlon": "ParkhoutWin",
            "robin": "Vakantie2026",
            "roy": "Scoor456",
            "ryan": "Keeper007",
            "sven": "ParkhoutWin",
            "jesper": "ParkhoutWin",
            "tom": "Vakantie2026",
            "tim": "Scoor456",
            "wout": "Keeper007",
            "sander": "ParkhoutWin",
            "lorenzo": "Vakantie2026",
            "jim": "ParkhoutWin"
        };

        // Controleer of de gebruiker bestaat EN of het wachtwoord klopt
        if (teamLeden[user] && teamLeden[user] === pass) {
            localStorage.setItem('bingoUser', user);
            showBingo(user);
        } else {
            const error = document.getElementById('error');
            error.innerText = "Naam of wachtwoord onjuist!";
            error.style.display = 'block';
        }
    }

    // Functie: De unieke bingo tonen
    function showBingo(user) {
        // 1. Algemene pool van opdrachten (vul deze aan tot bijv. 30 stuks)
        const algemeen = [
            "Bier morsen", "Zingen op tafel", "Slippers kwijt", "Gele kaart", 
            "Scoort met links", "Regelt snacks", "Ligt als eerste in bed",
            "Vergeet zonnebrand", "Bestelt een rondje", "Wint een discussie"
        ];

        // 2. Specifieke opdrachten per persoon (minimaal 4 per persoon)
        const specifiek = {
            "Julian": ["Vergeet zijn tas", "Praat over data science", "Draagt een foute hoed"],
            "Tycho": ["Slaapt in de bus", "Verliest bij FIFA", "Zoekt zijn sleutels"],
            "Fabio": ["Makt een eigen doelpunt", "Is de bob", "Danst solo"]
        };

        // 3. Maak de kaart
        // We pakken de unieke items van de speler
        let mijnKaart = specifiek[user] || ["Iets grappigs 1", "Iets grappigs 2"];
        
        // We vullen de kaart aan met willekeurige items uit de algemene lijst
        // Totdat we er bijvoorbeeld 9 hebben (voor een 3x3 grid)
        while (mijnKaart.length < 9) {
            let randomItem = algemeen[Math.floor(Math.random() * algemeen.length)];
            if (!mijnKaart.includes(randomItem)) {
            mijnKaart.push(randomItem);
            }
        }

        // 4. Hussel de volgorde zodat het eruit ziet als een echte kaart
        mijnKaart.sort(() => Math.random() - 0.5);

        // 5. Bouw de HTML
        let html = `<h1>Bingo van ${user.toUpperCase()}</h1>`;
        html += `<div class="bingo-grid">`;
        mijnKaart.forEach(item => {
            html += `<div class="bingo-item" onclick="this.classList.toggle('checked')">${item}</div>`;
        });
        html += `</div>`;
        html += `<br><button onclick="logout()" class="btn-secondary">Log uit</button>`;
        
        document.getElementById('bingo-content').innerHTML = html;
    }

    function logout() {
      localStorage.removeItem('bingoUser');
      location.reload();
    }
  </script>
</body>
</html>
