<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Persoonlijke bingokaart</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
  
  <div id="nav-placeholder"></div>

  <main id="bingo-content">
    </main>
  
  <script>
    fetch('nav.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('nav-placeholder').innerHTML = data;
      });
    
    const main = document.getElementById('bingo-content');

    // 2. Check of er al een bekende gebruiker is
    const savedUser = localStorage.getItem('bingoUser');

    if (savedUser) {
      showBingo(savedUser);
    } else {
      showLoginForm();
    }

    // Functie: Inlogscherm tonen
    function showLoginForm() {
      main.innerHTML = `
        <div class="card login-form">
            <h2>Mijn Persoonlijke Pagina</h2>
            <h3>LEES GOED DE INFORMATIE BIJ ELKE KAART</h3>
            
            <input type="text" id="username" placeholder="Je naam (bijv. Jan)">
            <input type="password" id="password" placeholder="Wachtwoord">
            <button onclick="login()" class="btn-primary">Open mijn kaart</button>
            <p id="error" style="color:red; display:none;">Verkeerd wachtwoord!</p>

            ` + /* `
            <div class="map-wrapper locked-map">
                <div style="padding: 20px; filter: blur(5px); pointer-events: none;">
                    <input type="text" placeholder="Gebruikersnaam" disabled>
                    <input type="password" placeholder="Wachtwoord" disabled>
                    <button class="btn-primary" disabled>Inloggen</button>
                </div>

                <div class="map-overlay">
                    <span>Nog geblokkeerd 🔒<br></span>
                </div>
            </div>
            */ `
        </div>
      `;
    }

    // Functie: Inloggen verwerken
    function login() {
        const user = document.getElementById('username').value.trim().toLowerCase();
        const pass = document.getElementById('password').value.trim();

        // Het Wachtwoordenboek
        const teamLeden = {
            "julian": "Parkhout2!",
            "tycho": "Bulldozer123!",
            "fabio": "Vlieger8!",
            "lars": "Admin7!",
            "franck": "Marlboro9!",
            "sten": "Pace44!",
            "john": "Vedette00!",
            "marco": "RoboknieKees1!",
            "matej": "Gymgeit8!",
            "lennart": "Mini77!",
            "marijn": "Babypapa0!",
            "marlon": "Bigdef0!",
            "robin": "Grensblessa3!",
            "roy": "Utrecht!",
            "ryan": "Negen9!",
            "sven": "Kronkel2!",
            "jesper": "Blessaking7!",
            "tom": "Beest09!",
            "tim": "Paard88!",
            "wout": "Cappie7!",
            "sander": "Papakeep9!",
            "lorenzo": "Slidgod99!",
            "jim": "Tank87!"
        };

        // Controleer of de gebruiker bestaat EN of het wachtwoord klopt
        if (teamLeden[user] && teamLeden[user] === pass) {
            localStorage.setItem('bingoUser', user);
            showBingo(user);
        } else {
            const error = document.getElementById('error');
            error.innerText = "Naam of wachtwoord onjuist!";
            error.style.display = 'block';
        }
    }

    // Functie: De unieke bingo tonen
    function showBingo(user) {
        const container = document.getElementById('bingo-content');
    
        // 1. Check of er al een kaart in het geheugen staat voor deze gebruiker
        const storageKey = 'bingo_kaart_' + user;
        const opgeslagenData = localStorage.getItem(storageKey);
        
        let mijnKaart = [];

        if (opgeslagenData) {
            // KAART BESTAAT AL: We laden de kaart uit het geheugen
            mijnKaart = JSON.parse(opgeslagenData);
        } else {
            // KAART BESTAAT NOG NIET: We maken een nieuwe kaart aan (jouw originele logica)
            const algemeen = [
                { tekst: "Drank morsen", info: "Iemand anders moet per ongeluk zijn hele/volle glas omgooien, je mag geen invloed uitoefenen en je moet 3 mensen als getuigen hebben" },
                { tekst: "Ren 3 rondjes", info: "Je moet 3 rondjes om de 3 huisjes heen rennen binnen 3 minuten, zorg ervoor dat een van de organisatoren de tijd bij houdt" },
                { tekst: "Botten breken", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Activiteit tegen anderen", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Iemand KO", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Naakt rondlopen", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Rit platte kar", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "WC bezoekje", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Opruimsessie", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Grondpizza's", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Smirnoff Ice", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Rave room 2.0", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Mr. Barf", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Opdracht koprol", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Barfplek", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Yoga", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Scheten", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Overleef dag 1", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Striptease", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Bierflesjes", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Doe voorzichtig!", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Sven naakt?!?!?", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Smeken", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Monstermaster", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Lavishmaster", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Club uitgesmeten", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Geen toegang", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Gangnamstyle", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Tiktok", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Ice finder", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Ice tellers", info: "Je moet minimaal 5 minuten hebben gezocht." },
                { tekst: "Naakte mannen", info: "Je moet minimaal 5 minuten hebben gezocht." }
            ];

            const specifiek = {
                "julian": [
                    { tekst: "Data science talk", info: "Julian begint een technisch verhaal." },
                    { tekst: "Foute hoed", info: "De roze vissershoed moet op." }
                ],
                "tycho": [
                    { tekst: "Slaapt in de bus", info: "Helemaal naar het eindpunt." },
                    { tekst: "Zoekt sleutels", info: "Iedereen moet helpen." }
                ]
            };

            // Pak de unieke items en voeg 'checked: false' toe aan elk object
            const startItems = specifiek[user] || [];
            mijnKaart = startItems.map(item => ({ ...item, checked: false }));

            // Vul aan tot 9 items uit de algemene lijst
            while (mijnKaart.length < 9) {
                let randomItem = algemeen[Math.floor(Math.random() * algemeen.length)];
                // Check of het item niet al op de kaart staat
                if (!mijnKaart.some(e => e.tekst === randomItem.tekst)) {
                    mijnKaart.push({ ...randomItem, checked: false });
                }
            }

            // Hussel de volgorde éénmalig
            mijnKaart.sort(() => Math.random() - 0.5);

            // Sla deze nieuwe kaart direct op in het geheugen
            localStorage.setItem(storageKey, JSON.stringify(mijnKaart));
        }

        // 2. De functie die het afvinken regelt en opslaat
        window.toggleVakje = function(index) {
            // Verander de status in de lijst
            mijnKaart[index].checked = !mijnKaart[index].checked;
            
            // Sla de bijgewerkte lijst op
            localStorage.setItem(storageKey, JSON.stringify(mijnKaart));
            
            // Teken de kaart opnieuw om de rode kleur te tonen
            renderBingoHTML(mijnKaart, user, container);
        };

        // 3. Teken de kaart voor de eerste keer
        renderBingoHTML(mijnKaart, user, container);
    }

    // 4. Losse functie om de HTML op te bouwen (zo houden we de code schoon)
    function renderBingoHTML(kaart, user, container) {
        let html = `<h1>Bingo van ${user.toUpperCase()}</h1>`;
        html += `<div class="bingo-grid">`;

        kaart.forEach((item, index) => {
            // Voeg de class 'checked' toe als het item in het geheugen op 'true' staat
            const checkedClass = item.checked ? 'checked' : '';
            
            html += `
            <div class="bingo-item ${checkedClass}" onclick="toggleVakje(${index})">
                <span class="item-text">${item.tekst}</span>
                <button type="button" class="info-btn" onclick="event.stopPropagation(); alert('${item.info}');">i</button>
            </div>`;
        });

        html += `</div>`;
        html += `<button onclick="logout()" class="btn-secondary" style="margin-top: 30px;">Uitloggen</button>`;

        container.innerHTML = html;
    }

    function logout() {
      localStorage.removeItem('bingoUser');
      location.reload();
    }
  </script>
</body>
</html>
