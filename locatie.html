<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locatie</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="nav-placeholder"></div>

  <main>
    <h1>Locatie</h1>
      <p></p>

  <div class="card">
    <h2>Dit jaar gaan we naar … Maasbree</h2>
    <h2>Groepsaccommodatie Aan de Linde</h2>

    <p class="highlight">
      📍 Struiken 6, Maasbree  
      📌 51.373288, 5.962819
    </p>
  </div>

  <div class="card">
    <h2>🗺️ Kaart</h2>

    <iframe 
      src="https://maps.google.com/maps?q=51.373288,5.962819&z=15&output=embed"
      width="100%" 
      height="300" 
      style="border:0; border-radius: 12px;"
      loading="lazy">
    </iframe>
  </div>
  </main>
  
  <script>
    fetch('nav.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('nav-placeholder').innerHTML = data;
      });
  </script>

</body>
</html>
