<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locatie</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="robots" content="noindex, nofollow">
</head>
<body>

  <div id="nav-placeholder"></div>

  <main>
    <h1>Locatie</h1>
    <p>De locatie blijft nog even geheim...</p>

    <div class="card">
      <h2>Locatie 🔒</h2>
      <p>De exacte locatie is nog niet onthuld.</p>

      <button id="revealLocationBtn" class="reveal-btn">
        Reveal de Locatie
      </button>

      <div id="locationHint" class="reveal-hint hidden">
        <p><strong>Hint 1:</strong> We hebben genoeg auto's nodig om er te komen.</p>
      </div>
    </div>

    <div class="card">
      <h2>🗺️ Kaart</h2>

      <div class="map-wrapper locked-map">
        <iframe
          src="https://maps.google.com/maps?q=Bad%20Bentheim,Germany&z=9&output=embed"
          loading="lazy"
          title="Verborgen kaart">
        </iframe>

        <div class="map-overlay">
          <span>Locatie nog geheim 🔒</span>
        </div>
      </div>
    </div>
  </main>
  
  <script>
    fetch('nav.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('nav-placeholder').innerHTML = data;
      });

    const revealBtn = document.getElementById('revealLocationBtn');
    const hintBox = document.getElementById('locationHint');

    revealBtn.addEventListener('click', () => {
      hintBox.classList.remove('hidden');
      revealBtn.disabled = true;
      revealBtn.textContent = 'Hint onthuld';
    });
  </script>

</body>
</html>
