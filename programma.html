<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programma</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
  
  <div id="nav-placeholder"></div>

  <main>
    <h1>Programma</h1>

    <div class="timeline-container">
        <div class="timeline-line"></div>

        <div class="timeline-item reveal">
            <div class="timeline-content">
                <span class="time">Vrijdag 18:00</span>
                <h3>De Verzameling 🍻</h3>
                <p>Locatie: Parkhout. Zorg dat je tas gepakt is!</p>
            </div>
        </div>

        <div class="timeline-item locked">
            <div class="timeline-content">
                <span class="time">Vrijdag 20:30</span>
                <h3>Bestemming Onbekend 🚌</h3>
                <p class="blurred-text">Dit wordt pas onthuld bij vertrek...</p>
                <div class="lock-icon">🔒</div>
            </div>
        </div>

        <div class="timeline-item locked">
            <div class="timeline-content">
                <span class="time">Zaterdag 11:00</span>
                <h3>Ochtendactiviteit ⚽</h3>
                <p>Iets met een bal en veel zweet.</p>
            </div>
        </div>
    </div>

  </main>
  
  <script>
    fetch('nav.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('nav-placeholder').innerHTML = data;
      });
  </script>

</body>
</html>
