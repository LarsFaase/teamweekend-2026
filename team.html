<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Organisatie</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
  
  <div id="nav-placeholder"></div>

  <main>
    <h1>Team Organisatie</h1>
    <p>Klik op een gezicht om de rol te zien!</p>

    <div class="team-container">
      <div class="flip-card" onclick="this.classList.toggle('flipped')">
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <img src="pictures/unknown person.png" alt="Naam">
          </div>
          <div class="flip-card-back">
            <h3>Naam 1</h3>
            <p>De aanvoerder en regelaar van het bier.</p>
          </div>
        </div>
      </div>

      <div class="flip-card" onclick="this.classList.toggle('flipped')">
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <img src="pictures/unknown person.png" alt="Naam">
          </div>
          <div class="flip-card-back">
            <h3>Naam 2</h3>
            <p>Verantwoordelijk voor de catering.</p>
          </div>
        </div>
      </div>

      <div class="flip-card" onclick="this.classList.toggle('flipped')">
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <img src="pictures/unknown person.png" alt="Naam">
          </div>
          <div class="flip-card-back">
            <h3>Naam 5</h3>
            <p>De penningmeester.</p>
          </div>
        </div>
      </div>
    </div>
  </main>
  
  <script>
    fetch('nav.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('nav-placeholder').innerHTML = data;
      });
  </script>

</body>
</html>
